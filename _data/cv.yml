- title: Research Experience
  type: time_table
  contents:
    - title: Research Scientist
      institution: Centre for Modeling, Simulation & Imaging in Medicine (CeMSIM) & Biomedical Engineering, Rensselaer Polytechnic Institute, Troy, NY
      year: Aug 2024 - present
      description:
        - In vivo non-invasive optical imaging for drug internalization quantification in HER2+ tumor xenografts via Fluorescence Lifetime Imaging (FLI).
        - Developing deep learning and AI hardware accelerator algorithms for real-time FLI, for translation to image-guided surgery.
        - Developing macro- and mesoscopic optical imaging setups including single-pixel and light-sheet based systems.
        - FLI data processing using Deep Learning models and Hierarchical Bayesian inferences.
        - Co-Principal Investigator in the RPI-IBM Artificial Intelligence Research Collaboration (AIRC) for neural network-accelerated hardware development for FLI.
        - Forging new collaborations and nurturing partnerships through joint research projects and proposals.
        - Mentoring 1 PhD student and guiding 2 undergraduate students.
    - title: Postdoctoral Research Associate
      institution: Biomedical Engineering & CeMSIM, Rensselaer Polytechnic Institute, Troy, NY
      year: Jan 2022 - Aug 2024
      description:
        - In vivo non-invasive optical imaging for drug internalization quantification in HER2+ tumour xenografts via FLI.
        - Machine learning model development to simplify and accelerate analysis of complex inverse problems.
